apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitlap-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/aelidrys/IOT_repo.git"
    targetRevision: HEAD
    path: manifest_files
  destination:
    server: "https://kubernetes.default.svc"
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
